        // --- Icon Component ---
        const Icon = ({ name, className }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const icon = lucide.createIcons({
                        icons: { [name]: lucide[name] },
                        nameAttr: 'data-lucide',
                        attrs: { class: className }
                    });
                }
            }, [name, className]);
            return <span ref={iconRef} data-lucide={name}></span>;
        };

        // --- Helper: RIFF WAV Creation ---
        function createWavBlob(pcmData, sampleRate, channels, bitsPerSample) {
            const headerSize = 44;
            const dataSize = pcmData.length;
            const buffer = new ArrayBuffer(headerSize + dataSize);
            const view = new DataView(buffer);
            
            const writeString = (view, offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };

            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, channels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * channels * bitsPerSample / 8, true);
            view.setUint16(32, channels * bitsPerSample / 8, true);
            view.setUint16(34, bitsPerSample, true);
            writeString(view, 36, 'data');
            view.setUint32(40, dataSize, true);
            
            const bytes = new Uint8Array(buffer, 44);
            bytes.set(pcmData);
            
            return new Blob([buffer], { type: 'audio/wav' });
        }

        // --- Main App ---
        function App() {
            const [apiKeys, setApiKeys] = useState(['']);
            const [activeKeyIndex, setActiveKeyIndex] = useState(0);
            const [showKeyManager, setShowKeyManager] = useState(false);
            const [text, setText] = useState('');
            const [selVoice, setSelVoice] = useState('Kore');
            const [selEmotion, setSelEmotion] = useState('neutral');
            const [speed, setSpeed] = useState(1.0);
            const [pitch, setPitch] = useState(0);
            const [volumeBoost, setVolumeBoost] = useState(1.0);
            const [clarity, setClarity] = useState(50);
            const [warmth, setWarmth] = useState(50);
            const [isGenerating, setIsGenerating] = useState(false);
            const [audioUrl, setAudioUrl] = useState(null);
            const [history, setHistory] = useState([]);
            const [voiceFilter, setVoiceFilter] = useState('all');
            const [statusMsg, setStatusMsg] = useState(null);
            const [generationStep, setGenerationStep] = useState(0);
            const [customEmotion, setCustomEmotion] = useState('');
            const [newKeyInput, setNewKeyInput] = useState('');

            const audioRef = useRef(null);

            // Auto-play when audioUrl changes
            useEffect(() => {
                if (audioUrl && audioRef.current) {
                    audioRef.current.play().catch(e => console.log("Autoplay blocked", e));
                }
            }, [audioUrl]);

            // Load saved data
            useEffect(() => {
                const savedKeys = localStorage.getItem('genvoice_api_keys');
                if (savedKeys) {
                    try {
                        const parsed = JSON.parse(savedKeys);
                        if (Array.isArray(parsed) && parsed.length > 0) setApiKeys(parsed);
                    } catch (e) {}
                }

                const savedHistory = localStorage.getItem('genvoice_history');
                if (savedHistory) {
                    try { setHistory(JSON.parse(savedHistory)); } catch (e) {}
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('genvoice_history', JSON.stringify(history.slice(0, 20)));
            }, [history]);

            useEffect(() => {
                localStorage.setItem('genvoice_api_keys', JSON.stringify(apiKeys));
            }, [apiKeys]);

            const showStatus = (text, type = 'info') => {
                setStatusMsg({ text, type });
                setTimeout(() => setStatusMsg(null), 3000);
            };

            const handleEmotionChange = (id) => {
                setSelEmotion(id);
                const presets = {
                    neutral: { s: 1.0, p: 0 }, happy: { s: 1.1, p: 2 }, sad: { s: 0.8, p: -3 },
                    angry: { s: 1.2, p: 4 }, excited: { s: 1.3, p: 3 }, calm: { s: 0.9, p: -2 }
                };
                const preset = presets[id];
                if (preset) { setSpeed(preset.s); setPitch(preset.p); }
            };

            const getValidKey = () => {
                const validKeys = apiKeys.filter(k => k.trim());
                return validKeys.length > 0 ? validKeys[activeKeyIndex % validKeys.length] : null;
            };

            const handleGenerate = async () => {
                if (!text.trim()) return showStatus('Please enter some text', 'error');
                const key = getValidKey();
                if (!key) return showStatus('Please add API Key in Settings', 'error');

                setIsGenerating(true);
                setGenerationStep(1);

                const attemptSpeech = async (key, retryCount = 0) => {
                    try {
                        const emotion = EMOTIONS.find(e => e.id === selEmotion);
                        let prompt = customEmotion.trim() ? `Speak with a ${customEmotion} tone` : (emotion?.prompt || 'Speak naturally');
                        prompt += `: ${text}`;

                        setGenerationStep(3);
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${key}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }],
                                generationConfig: {
                                    responseModalities: ["AUDIO"],
                                    speechConfig: {
                                        voiceConfig: {
                                            prebuiltVoiceConfig: { voiceName: selVoice }
                                        }
                                    }
                                }
                            })
                        });

                        const data = await response.json();
                        if (data.error) throw new Error(data.error.message);
                        return data.candidates[0].content.parts[0].inlineData.data;
                    } catch (err) {
                        const maxRetries = apiKeys.filter(k => k.trim()).length;
                        if (retryCount < maxRetries - 1) {
                            const { key: nextKey, index } = rotateKey();
                            if (nextKey) {
                                showStatus(`Retrying with API Key #${index + 1}...`, 'info');
                                await new Promise(r => setTimeout(r, 1000));
                                return attemptSpeech(nextKey, retryCount + 1);
                            }
                        }
                        throw err;
                    }
                };

                try {
                    const base64Audio = await attemptSpeech(key);
                    const binaryString = atob(base64Audio);
                    const bytes = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);

                    setGenerationStep(4);
                    let finalBlob = createWavBlob(bytes, 24000, 1, 16);

                    const url = URL.createObjectURL(finalBlob);
                    setAudioUrl(url);

                    const newItem = {
                        id: Date.now(),
                        text: text.substring(0, 50) + (text.length > 50 ? '...' : ''),
                        voice: selVoice,
                        emotion: customEmotion || emotion.name,
                        color: emotion.color,
                        time: new Date().toLocaleTimeString(),
                        audioUrl: url
                    };
                    setHistory([newItem, ...history]);
                    showStatus('Speech generated!', 'success');
                } catch (err) {
                    showStatus(err.message, 'error');
                } finally {
                    setIsGenerating(false);
                }
            };

                                        <Icon name="Volume2" className="w-4 h-4 text-cyan-400" />
                                        Text to Speech
                                    </label>
                                    <button onClick={() => setText('')} className="p-2 rounded-lg bg-white/5 text-slate-400"><Icon name="Trash2" className="w-4 h-4" /></button>
                                </div>
                                <textarea value={text} onChange={e => setText(e.target.value)} rows={8} placeholder="Type or paste text..." className="w-full bg-black/20 border border-white/10 rounded-xl p-4 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500/50 resize-none"></textarea>
                            </section>

                            <section className="glass-panel p-6">
                                <label className="text-sm font-semibold text-slate-300 mb-4 block">Select Emotion</label>
                                <div className="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-10 gap-2 max-h-60 overflow-y-auto pr-2 custom-scrollbar">
                                    {EMOTIONS.map(e => (
                                        <button key={e.id} onClick={() => handleEmotionChange(e.id)} className={`flex flex-col items-center p-2 rounded-lg border transition-all ${selEmotion === e.id ? 'bg-cyan-500/10 border-cyan-500/50' : 'bg-white/5 border-transparent'}`}>
                                            <span className="text-xl mb-1">{e.icon}</span>
                                            <span className="text-[9px] font-bold text-slate-400 truncate w-full text-center">{e.name}</span>
                                        </button>
                                    ))}
                                </div>
                            </section>

                                    <div className="flex gap-2">

                                        ))}
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 max-h-60 overflow-y-auto pr-2 custom-scrollbar">

                                        <button key={v.name} onClick={() => setSelVoice(v.name)} className={`p-3 rounded-xl border transition-all ${selVoice === v.name ? 'bg-indigo-600 border-indigo-400' : 'bg-white/5 border-white/10'}`}>

                                            <div className="text-[8px] opacity-60">{v.style}</div>
                                        </button>

                            <button onClick={handleGenerate} disabled={isGenerating} className="w-full py-5 rounded-2xl font-bold text-lg bg-gradient-to-r from-cyan-500 to-indigo-600 shadow-xl flex items-center justify-center gap-3 disabled:opacity-50">

                        <div className="space-y-6">

                                    <div className="bg-black/40 p-4 rounded-xl border border-white/10 mb-4">

                                    <div className="grid grid-cols-2 gap-2">
                                        <a href={audioUrl} download="speech.wav" className="flex items-center justify-center gap-2 py-2 rounded-lg bg-white/5 text-[10px] font-bold uppercase"><Icon name="Download" className="w-3 h-3" /> Download</a>
                                        <button onClick={() => navigator.share({title: 'GenVoice', url: audioUrl})} className="flex items-center justify-center gap-2 py-2 rounded-lg bg-white/5 text-[10px] font-bold uppercase"><Icon name="Share2" className="w-3 h-3" /> Share</button>
                                    </div>
                                </section>
                            )}

                            <section className="glass-panel p-6">
                                <h3 className="text-sm font-semibold mb-4 flex items-center gap-2"><Icon name="History" className="w-4 h-4 text-indigo-400" /> History</h3>
                                <div className="space-y-3 max-h-80 overflow-y-auto pr-2 custom-scrollbar">
                                    {history.map(item => (
                                        <button key={item.id} onClick={() => { audioRef.current.src = item.audioUrl; audioRef.current.play(); }} className="w-full text-left p-3 rounded-xl bg-white/5 border border-white/5 hover:border-cyan-500/30">
                                            <div className="flex justify-between text-[9px] mb-1"><span className="font-bold uppercase">{item.emotion}</span><span>{item.time}</span></div>
                                            <div className="text-[10px] font-bold text-indigo-400">{item.voice}</div>
                                            <div className="text-[10px] text-slate-400 truncate">{item.text}</div>
                                        </button>
                                    ))}
                                </div>
                            </section>
                        </div>
                    </div>

                    {showKeyManager && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-md flex items-start justify-center z-[200] p-4 overflow-y-auto">
                            <div className="bg-slate-900 border border-white/10 max-w-md w-full rounded-3xl p-6 my-auto">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-bold">Settings</h2>
                                    <button onClick={() => setShowKeyManager(false)}><Icon name="X" className="w-6 h-6" /></button>
                                </div>
                                
                                <div className="mb-6">
                                    <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Gemini API Keys</label>
                                    <input type="password" value={newKeyInput} onChange={e => setNewKeyInput(e.target.value)} placeholder="Enter Gemini API Key..." className="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-sm mb-2" />
                                    <button onClick={() => { if(newKeyInput) { setApiKeys([...apiKeys.filter(k=>k), newKeyInput]); setNewKeyInput(''); showStatus('Key added!', 'success'); }}} className="w-full bg-emerald-500 text-black font-bold py-3 rounded-xl mb-4">Add Key</button>
                                    <div className="space-y-2 max-h-32 overflow-y-auto custom-scrollbar">
                                        {apiKeys.filter(k=>k).map((k, i) => (
                                            <div key={i} className="flex justify-between items-center bg-white/5 p-3 rounded-xl">
                                                <span className="text-[10px] font-mono opacity-50">{k.substring(0, 10)}...</span>
                                                <button onClick={() => setApiKeys(apiKeys.filter((_, idx) => idx !== i))} className="text-rose-500"><Icon name="Trash2" className="w-4 h-4" /></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {statusMsg && (
                        <div className={`fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-xs font-bold shadow-2xl z-50 flex items-center gap-2 border ${statusMsg.type === 'error' ? 'bg-rose-500/20 border-rose-500/50 text-rose-400' : 'bg-cyan-500/20 border-cyan-500/50 text-cyan-400'}`}>
                            <Icon name={statusMsg.type === 'error' ? 'AlertTriangle' : 'CheckCircle2'} className="w-4 h-4" />
                            {statusMsg.text}
                        </div>
                    )}

                    {isGenerating && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-xl flex items-center justify-center z-[300]">
                            <div className="text-center">
                                <Icon name="Loader2" className="w-12 h-12 animate-spin text-cyan-400 mx-auto mb-4" />
                                <p className="text-sm font-bold">Synthesizing Voice...</p>
                                <p className="text-[10px] text-slate-500 mt-2">Step {generationStep} of 5</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
