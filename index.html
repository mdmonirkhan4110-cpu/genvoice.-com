<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GenVoice - Gemini TTS</title>
    <meta name="theme-color" content="#06b6d4">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  </head>
  <body>
    <div id="root">
      <div id="loading-screen" style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #0f172a; color: #38bdf8; font-family: sans-serif; flex-direction: column;">
        <div style="width: 40px; height: 40px; border: 4px solid #1e293b; border-top: 4px solid #38bdf8; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;"></div>
        <p id="status-text">Loading GenVoice Engine...</p>
        <div id="error-display" style="display: none; margin-top: 20px; padding: 15px; background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; color: #f87171; border-radius: 8px; max-width: 80%; font-size: 12px; font-family: monospace; text-align: center;"></div>
      </div>
      <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
          var errorDisplay = document.getElementById('error-display');
          var statusText = document.getElementById('status-text');
          if (errorDisplay) {
            errorDisplay.style.display = 'block';
            errorDisplay.innerHTML = '<b>App Error:</b><br>' + msg + '<br><small>Line: ' + lineNo + '</small>';
            statusText.innerText = 'Failed to load application';
          }
          return false;
        };
      </script>
      <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
